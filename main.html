<!DOCTYPE html>
<html>
<head>
  <title>Nested HTML Tables</title>
  <style>
    table {
      border-collapse: collapse;
      width: 100%;
      table-layout: fixed;
    }
    td, th {
      border: 1px solid black;
      padding: 4px;
      text-align: center;
      vertical-align: middle;
    }
    .black-cell {
      background-color: black;
      color: white;
      font-weight: bold;
    }
    .left-align {
      text-align: left;
    }
  </style>
</head>
<body>
  <table>
    <tr>
      <td>
        <table>
          <tr>
            <th>Nested Table 2</th>
          </tr>
          <tr>
            <td>
              <table>
                <tr>
                  <th>Column 1</th>
                  <th>Column 2</th>
                </tr>
                <tr>
                  <td>abc</td>
                  <td>def</td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
      <td>
        <table>
          <tr>
            <th>Nested Table 1</th>
          </tr>
          <tr>
            <td class="left-align">
              <ul>
                <li>List item 1</li>
                <li>List item 2</li>
                <li>List item 3</li>
              </ul>
            </td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <td>
        <table>
          <tr>
            <th>Nested Table 3</th>
          </tr>
          <tr>
            <td>
              <table>
                <tr>
                  <td><a href="#">Nested Table</a></td>
                  <td>Demo Continued</td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
      <td>
        <table>
          <tr>
            <th>Nested Table 4</th>
          </tr>
          <tr>
            <td class="black-cell">HTML</td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
